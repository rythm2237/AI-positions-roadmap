ng automatically\",\"To make tokenization impossible\",\"To remove context\"],\"correctAnswerIndex\":0,\"explanation\":\"Constraints define boundaries such as length, tone, sources, and forbidden actions.\"},{\"id\":\"prompt-p1-s2-q3\",\"question\":\"Which validation step is most appropriate for The Anatomy of a Great Prompt?\",\"options\":[\"Accepting the first AI or automation output without checking it\",\"Comparing the output with source data, tool logs, and task-specific requirements\",\"Deleting input examples after every run\",\"Changing multiple variables before each test run\"],\"correctAnswerIndex\":1,\"explanation\":\"Reliable AI and automation work requires validating outputs against source data, execution logs, and task requirements.\"}]}},{\"id\":\"prompt-p1-s3\",\"title\":\"Temperature, Top-P \u0026 Sampling\",\"description\":\"Learn how sampling controls creativity, determinism, and risk.\",\"estimatedTime\":\"3 hours\",\"difficulty\":\"Intermediate\",\"learningTypes\":[\"Reading\",\"Quiz\"],\"resources\":[{\"label\":\"Hugging Face Generation Strategies\",\"type\":\"article\",\"url\":\"https://huggingface.co/docs/transformers/en/generation_strategies\"},{\"label\":\"OpenAI Text Generation Guide\",\"type\":\"article\",\"url\":\"https://platform.openai.com/docs/guides/text-generation\"}],\"test\":{\"id\":\"prompt-p1-s3-test\",\"title\":\"Temperature, Top-P \u0026 Sampling Check\",\"questions\":[{\"id\":\"prompt-p1-s3-q1\",\"question\":\"What does temperature close to 0 usually produce?\",\"options\":[\"More deterministic outputs\",\"Longer context windows\",\"More API keys\",\"Guaranteed factuality\"],\"correctAnswerIndex\":0,\"explanation\":\"Lower temperature reduces randomness but does not guarantee truth.\"},{\"id\":\"prompt-p1-s3-q2\",\"question\":\"When is a higher temperature usually more appropriate?\",\"options\":[\"Brainstorming varied creative options\",\"Extracting exact invoice totals\",\"Running database migrations\",\"Validating legal citations\"],\"correctAnswerIndex\":0,\"explanation\":\"Creative tasks benefit from more diverse sampling.\"},{\"id\":\"prompt-p1-s3-q3\",\"question\":\"Which validation step is most appropriate for Temperature, Top-P \u0026 Sampling?\",\"options\":[\"Accepting the first AI or automation output without checking it\",\"Comparing the output with source data, tool logs, and task-specific requirements\",\"Deleting input examples after every run\",\"Changing multiple variables before each test run\"],\"correctAnswerIndex\":1,\"explanation\":\"Reliable AI and automation work requires validating outputs against source data, execution logs, and task requirements.\"}]}},{\"id\":\"prompt-p1-s4\",\"title\":\"System Prompts \u0026 Personas\",\"description\":\"Use higher-priority instructions while keeping personas safe and task-specific.\",\"estimatedTime\":\"3 hours\",\"difficulty\":\"Intermediate\",\"learningTypes\":[\"Reading\",\"Practice\"],\"resources\":[{\"label\":\"Anthropic Prompt Engineering Overview\",\"type\":\"article\",\"url\":\"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview\"},{\"label\":\"OpenAI Prompt Engineering Guide\",\"type\":\"article\",\"url\":\"https://platform.openai.com/docs/guides/prompt-engineering\"}],\"test\":{\"id\":\"prompt-p1-s4-test\",\"title\":\"System Prompts \u0026 Personas Check\",\"questions\":[{\"id\":\"prompt-p1-s4-q1\",\"question\":\"How does a system message differ from a user message?\",\"options\":[\"It sets higher-priority behavior for the assistant\",\"It always contains JSON\",\"It is ignored by model APIs\",\"It stores billing settings\"],\"correctAnswerIndex\":0,\"explanation\":\"System instructions are used to define assistant behavior and constraints.\"},{\"id\":\"prompt-p1-s4-q2\",\"question\":\"What is a risk of an overly broad persona prompt?\",\"options\":[\"Inconsistent or unsafe behavior outside the task\",\"Lower monitor brightness\",\"Fewer tokens in the tokenizer\",\"Faster database joins\"],\"correctAnswerIndex\":0,\"explanation\":\"Personas should serve task goals and safety constraints.\"},{\"id\":\"prompt-p1-s4-q3\",\"question\":\"Which validation step is most appropriate for System Prompts \u0026 Personas?\",\"options\":[\"Accepting the first AI or automation output without checking it\",\"Comparing the output with source data, tool logs, and task-specific requirements\",\"Deleting input examples after every run\",\"Changing multiple variables before each test run\"],\"correctAnswerIndex\":1,\"explanation\":\"Reliable AI and automation work requires validating outputs against source data, execution logs, and task requirements.\"}]}},{\"id\":\"prompt-p1-s5\",\"title\":\"Practice: Prompt Iteration Lab\",\"description\":\"Compare prompt versions, run A/B tests, and document improvements.\",\"estimatedTime\":\"3 hours\",\"difficulty\":\"Beginner\",\"learningTypes\":[\"Practice\",\"Tool\"],\"resources\":[{\"label\":\"Awesome ChatGPT Prompts\",\"type\":\"tool\",\"url\":\"https://github.com/f/awesome-chatgpt-prompts\"},{\"label\":\"FlowGPT Prompt Library\",\"type\":\"tool\",\"url\":\"https://flowgpt.com/\"}],\"test\":{\"id\":\"prompt-p1-s5-test\",\"title\":\"Practice: Prompt Iteration Lab Check\",\"questions\":[{\"id\":\"prompt-p1-s5-q1\",\"question\":\"What should you change when A/B testing prompts?\",\"options\":[\"One meaningful variable at a time\",\"Every instruction and model at once\",\"Only the file name\",\"The browser language only\"],\"correctAnswerIndex\":0,\"explanation\":\"Controlled changes make it possible to attribute improvements.\"},{\"id\":\"prompt-p1-s5-q2\",\"question\":\"What metric best evaluates a summarization prompt?\",\"options\":[\"Faithfulness and coverage against source text\",\"Number of emojis\",\"Model logo color\",\"Random output length\"],\"correctAnswerIndex\":0,\"explanation\":\"Summaries should be accurate to the source and cover key points.\"},{\"id\":\"prompt-p1-s5-q3\",\"question\":\"Which validation step is most appropriate for Practice: Prompt Iteration Lab?\",\"options\":[\"Accepting the first AI or automation output without checking it\",\"Comparing the output with source data, tool logs, and task-specific requirements\",\"Deleting input examples after every run\",\"Changing multiple variables before each test run\"],\"correctAnswerIndex\":1,\"explanation\":\"Reliable AI and automation work requires validating outputs against source data, execution logs, and task requirements.\"}]}}],\"finalTest\":{\"id\":\"prompt-p1-final\",\"title\":\"Phase 1 Final: Language Model Fundamentals\",\"questions\":[{\"id\":\"prompt-p1-final-q1\",\"question\":\"In Language Model Fundamentals, what should be defined before a workflow, prompt, model, or dashboard is released?\",\"options\":[\"Only the tool brand used in the demo\",\"Input data, output format, acceptance criteria, owner, and validation method\",\"A promise that the AI will never make mistakes\",\"The color of the final presentation\"],\"correctAnswerIndex\":1,\"explanation\":\"A professional release needs defined inputs, outputs, owners, validation, and acceptance criteria.\"},{\"id\":\"prompt-p1-final-q2\",\"question\":\"Which signal indicates a quality problem during Language Model Fundamentals?\",\"options\":[\"The workflow includes source links and logs\",\"Outputs are confident but cannot be traced to source data, rules, or tests\",\"The project has a rollback or revision plan\",\"The team records assumptions and constraints\"],\"correctAnswerIndex\":1,\"explanation\":\"Confident untraceable outputs are a core risk in AI-enabled work.\"},{\"id\":\"prompt-p1-final-q3\",\"question\":\"Which artifact best supports maintenance after Language Model Fundamentals is handed off?\",\"options\":[\"A private chat message with no context\",\"A runbook or case study with data sources, configuration, tests, and known limitations\",\"A screenshot of the final result only\",\"An undocumented copy of the prompt or workflow\"],\"corre
